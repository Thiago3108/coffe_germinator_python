# Configuración declarativa para Render.com
# (Render la detecta automáticamente al hacer Deploy)

services:
  - type: web
    name: germinador-iot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_TOKEN
        sync: false      # marcado como secret — se configura en el dashboard
      - key: CORS_ORIGINS
        value: ""        # vacío = sin CORS (la app nativa no lo necesita)
      - key: DATABASE_URL
        value: "sqlite:///./germinador.db"
    healthCheckPath: /health
